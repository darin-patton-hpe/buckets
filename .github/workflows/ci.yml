name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -v

      - name: Vet
        run: go vet ./...

  validate-release:
    needs: test
    if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, 'release v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate VERSION matches PR title
        run: |
          title="${{ github.event.pull_request.title }}"
          version=$(echo "$title" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          file_version=$(cat VERSION | tr -d '[:space:]')
          if [ -z "$version" ]; then
            echo "::error::PR title does not contain a valid semver version"
            exit 1
          fi
          if [ "$file_version" != "$version" ]; then
            echo "::error::VERSION file ($file_version) does not match PR title version ($version)"
            exit 1
          fi
          echo "✓ VERSION file matches PR title: $version"

  alpha:
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean

      - uses: actions/upload-artifact@v4
        with:
          name: buckets-snapshot
          path: dist/*.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: buckets-snapshot-windows
          path: dist/*.zip

  release:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for release commit
        id: check
        run: |
          msg=$(git log -1 --format='%s')
          if echo "$msg" | grep -qiE '^release v[0-9]+\.[0-9]+\.[0-9]+'; then
            version=$(echo "$msg" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        if: steps.check.outputs.should_release == 'true'
        with:
          go-version-file: go.mod

      - name: Create tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          git tag ${{ steps.check.outputs.version }}
          git push origin ${{ steps.check.outputs.version }}

      - name: Release
        if: steps.check.outputs.should_release == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
